name: customer CD Pipeline
on:
  workflow_run:
    workflows: ["customer CI Pipeline"]
    types:
      - completed

jobs:
  DEPLOY:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Helm charts repo
        uses: actions/checkout@v4
        with:
          repository: naveen-uppala/Infra-App-Deployment
          path: App/helm-charts
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

    - name: Resolve image tag
      id: resolve_image_tag
      run: |
        RUN_NUMBER=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/Frontend_CI.yml/runs?status=success&per_page=1" \
          | jq -r '.workflow_runs[0].run_number')
    
        if [ "$RUN_NUMBER" = "null" ] || [ -z "$RUN_NUMBER" ]; then
          echo "No successful build found"
          exit 1
        fi
    
        if [ -n "${{ inputs.image_tag }}" ]; then
          TAG="${{ inputs.image_tag }}"
          echo "Using input tag: $TAG"
        else
          TAG="$RUN_NUMBER"
          echo "Using last successful build tag: $TAG"
        fi
        echo "image_tag=$TAG" >> $GITHUB_OUTPUT    
          

      - name: Deploy to EKS via Helm
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ github.event.workflow_run.head_repository.name }}
          IMAGE_TAG: ${{ steps.resolve_image_tag.outputs.image_tag }}
        run: |
          helm upgrade --install ${{ vars.HELM_RELEASE_NAME }} ./helm/${{ vars.HELM_CHART_NAME }} \
            --namespace ${{ vars.K8S_NAMESPACE }} \
            --create-namespace \
            --set image.repository=$ECR_REGISTRY/$ECR_REPOSITORY \
            --set image.tag=$IMAGE_TAG \
            --set image.pullPolicy=Always \
            --values ./helm/${{ vars.HELM_CHART_NAME }}/values.yaml \
            --wait \
            --timeout 5m0s

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/${{ vars.HELM_RELEASE_NAME }} \
            --namespace ${{ vars.K8S_NAMESPACE }} \
            --timeout=3m
```

---

### Required GitHub Variables & Secrets

Add these under your repo's **Settings → Secrets and Variables**:

| Type | Name | Example Value |
|---|---|---|
| Secret | `AWS_ACCESS_KEY_ID` | `AKIA...` |
| Secret | `AWS_SECRET_ACCESS_KEY` | `wJalr...` |
| Variable | `AWS_REGION` | `ap-south-1` |
| Variable | `EKS_CLUSTER_NAME` | `my-eks-cluster` |
| Variable | `HELM_RELEASE_NAME` | `customer-release` |
| Variable | `HELM_CHART_NAME` | `customer` |
| Variable | `K8S_NAMESPACE` | `default` |

